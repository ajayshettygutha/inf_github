name: First Workflow

on:
  push:
  workflow_dispatch:

jobs:
  # First Job
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - name: Hello World
        run: echo "Hello World"

      - name: Event Name
        run: echo "Event Name: ${{ github.event_name }}"

  # Second Job
  echo-goodbye:
    needs: hello-world
    runs-on: ubuntu-latest
    steps:
      - name: Say Goodbye
        run: echo "Goodbye!!"

      - name: Multi-line Bash
        run: |
          echo "Script"

  # Third Job
  windows-echo:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: windows-latest
    steps:
      - name: Show OS
        shell: bash
        run: |
          echo "The job is running on Windows runner"
          echo "I am"
          echo "Multi Line"
